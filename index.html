<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Plane</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a0a1a;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

#gameContainer {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  display: block;
  max-width: 100%;
  max-height: 100%;
}

/* ===== Landing overlay ===== */
#landing {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 70%, #0f0c29 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  transition: opacity 0.6s ease;
  overflow: hidden;
}
#landing.hidden {
  opacity: 0;
  pointer-events: none;
}

/* Particle canvas behind landing content */
#landingParticles {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.landing-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#landing h1 {
  font-size: clamp(2.5rem, 10vw, 5rem);
  font-weight: 900;
  color: #fff;
  text-shadow:
    0 0 40px rgba(255,69,58,0.8),
    0 0 80px rgba(255,69,58,0.4),
    0 4px 12px rgba(0,0,0,0.5);
  margin-bottom: 0.3em;
  letter-spacing: 0.08em;
  animation: titleGlow 2.5s ease-in-out infinite;
}

@keyframes titleGlow {
  0%, 100% { transform: scale(1); text-shadow: 0 0 40px rgba(255,69,58,0.8), 0 0 80px rgba(255,69,58,0.4), 0 4px 12px rgba(0,0,0,0.5); }
  50% { transform: scale(1.04); text-shadow: 0 0 60px rgba(255,69,58,1), 0 0 120px rgba(255,69,58,0.6), 0 4px 12px rgba(0,0,0,0.5); }
}

#landing .subtitle {
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  color: rgba(255,255,255,0.7);
  margin-bottom: 0.5em;
  font-weight: 300;
  letter-spacing: 0.05em;
}

#landing .tagline {
  font-size: clamp(0.75rem, 2.5vw, 1rem);
  color: rgba(255,255,255,0.4);
  margin-bottom: 2.5em;
  font-style: italic;
}

/* Animated plane on landing */
.landing-plane {
  width: clamp(120px, 30vw, 220px);
  margin-bottom: 1.5em;
  animation: floatPlane 3s ease-in-out infinite;
  filter: drop-shadow(0 8px 24px rgba(230,57,70,0.4));
}

@keyframes floatPlane {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-20px) rotate(3deg); }
}

#playBtn {
  padding: 18px 56px;
  font-size: clamp(1.1rem, 4.5vw, 1.5rem);
  font-weight: 800;
  color: #fff;
  background: linear-gradient(135deg, #e63946 0%, #c1121f 50%, #a00010 100%);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 60px;
  cursor: pointer;
  box-shadow:
    0 6px 30px rgba(230,57,70,0.6),
    0 0 60px rgba(230,57,70,0.3),
    inset 0 1px 0 rgba(255,255,255,0.2);
  transition: all 0.3s ease;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
#playBtn:hover {
  transform: translateY(-3px) scale(1.08);
  box-shadow:
    0 10px 40px rgba(230,57,70,0.8),
    0 0 80px rgba(230,57,70,0.4),
    inset 0 1px 0 rgba(255,255,255,0.3);
}
#playBtn:active {
  transform: translateY(0) scale(0.97);
}

/* ===== PWA CTA Button (shared style) ===== */
.pwa-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 32px;
  font-size: clamp(0.85rem, 3.5vw, 1.15rem);
  font-weight: 800;
  color: #fff;
  background: linear-gradient(135deg, #ff9500 0%, #ff6a00 50%, #e55d00 100%);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 50px;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: all 0.3s ease;
  animation: ctaPulse 2s ease-in-out infinite;
  box-shadow:
    0 4px 20px rgba(255,149,0,0.5),
    0 0 40px rgba(255,149,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.25);
}
.pwa-cta:hover {
  transform: translateY(-2px) scale(1.06);
  box-shadow:
    0 8px 35px rgba(255,149,0,0.7),
    0 0 60px rgba(255,149,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.3);
}
.pwa-cta:active {
  transform: translateY(0) scale(0.97);
}
.pwa-cta .cta-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.pwa-cta .cta-text-main {
  font-weight: 900;
  text-transform: uppercase;
}
.pwa-cta .cta-text-sub {
  font-size: 0.7em;
  font-weight: 400;
  opacity: 0.85;
  display: block;
  margin-top: 1px;
}

@keyframes ctaPulse {
  0%, 100% {
    box-shadow: 0 4px 20px rgba(255,149,0,0.5), 0 0 40px rgba(255,149,0,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  50% {
    box-shadow: 0 4px 30px rgba(255,149,0,0.8), 0 0 60px rgba(255,149,0,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
  }
}

/* Landing page CTA position */
#landingCta {
  margin-top: 1.2em;
}

/* In-game floating CTA */
#gameCta {
  position: fixed;
  z-index: 55;
  pointer-events: auto;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  transform: translateY(10px);
}
#gameCta.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ===== Install Guide Modal ===== */
.install-modal-backdrop {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 9999;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.install-modal-backdrop.visible {
  display: flex;
}
.install-modal {
  background: linear-gradient(135deg, #1a1a3e 0%, #2a2a5e 100%);
  border-radius: 20px;
  padding: 28px 24px;
  max-width: 360px;
  width: 100%;
  color: #fff;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,149,0,0.15);
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
  position: relative;
}
.install-modal .modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  font-size: 1.5rem;
  cursor: pointer;
  line-height: 1;
}
.install-modal .modal-close:hover {
  color: #fff;
}
.install-modal .modal-icon {
  width: 64px;
  height: 64px;
  border-radius: 14px;
  margin: 0 auto 16px;
  display: block;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.install-modal h3 {
  font-size: 1.3rem;
  margin-bottom: 6px;
}
.install-modal .modal-subtitle {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.6);
  margin-bottom: 20px;
}
.install-modal .steps {
  text-align: left;
  margin-bottom: 20px;
}
.install-modal .step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}
.install-modal .step-num {
  background: linear-gradient(135deg, #ff9500, #ff6a00);
  color: #fff;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 0.85rem;
  flex-shrink: 0;
}
.install-modal .step-text {
  font-size: 0.9rem;
  line-height: 1.5;
  color: rgba(255,255,255,0.9);
  padding-top: 3px;
}
.install-modal .step-text strong {
  color: #ffd166;
}
.install-modal .modal-btn {
  display: inline-block;
  padding: 12px 32px;
  background: linear-gradient(135deg, #ff9500, #e55d00);
  color: #fff;
  border: none;
  border-radius: 30px;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
}
.install-modal .modal-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 20px rgba(255,149,0,0.5);
}
/* In-app browser warning style */
.install-modal .inapp-warning {
  background: rgba(255,107,107,0.15);
  border: 1px solid rgba(255,107,107,0.3);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.85);
  line-height: 1.6;
}
.install-modal .inapp-warning strong {
  color: #ff6b6b;
}

/* ===== Score HUD ===== */
#scoreHUD {
  position: fixed;
  top: 20px; left: 0; right: 0;
  text-align: center;
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#scoreHUD.visible {
  opacity: 1;
}
#scoreHUD span {
  font-size: clamp(2.5rem, 10vw, 5rem);
  font-weight: 900;
  color: #fff;
  text-shadow:
    0 2px 8px rgba(0,0,0,0.6),
    0 0 30px rgba(255,255,255,0.3);
  transition: transform 0.15s ease;
  display: inline-block;
}
#scoreHUD span.pop {
  transform: scale(1.4);
}

/* Score flash overlay */
#scoreFlash {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.08);
  pointer-events: none;
  z-index: 45;
  opacity: 0;
  transition: opacity 0.05s ease;
}
#scoreFlash.flash {
  opacity: 1;
}
</style>
</head>
<body>

<!-- Landing Page -->
<div id="landing">
  <canvas id="landingParticles"></canvas>
  <div class="landing-content">
    <img class="landing-plane" src="plane.png" alt="Red Biplane" />
    <h1>FLAPPY PLANE</h1>
    <p class="subtitle">How far can you fly?</p>
    <p class="tagline">Tap to fly. Dodge the obstacles. Beat your best.</p>
    <button id="playBtn">PLAY NOW</button>
    <button id="landingCta" class="pwa-cta">
      <img class="cta-icon" src="app-icon.png" alt="App Icon" />
      <span>
        <span class="cta-text-main">GET THE APP</span>
        <span class="cta-text-sub">Exclusive rewards inside</span>
      </span>
    </button>
  </div>
</div>

<!-- Score display -->
<div id="scoreHUD"><span id="scoreText">0</span></div>

<!-- Score flash -->
<div id="scoreFlash"></div>

<!-- In-game floating CTA (shown during ready & dead states) -->
<button id="gameCta" class="pwa-cta">
  <img class="cta-icon" src="app-icon.png" alt="App Icon" />
  <span>
    <span class="cta-text-main">GET THE APP</span>
    <span class="cta-text-sub">Exclusive rewards inside</span>
  </span>
</button>

<!-- Install Guide Modal -->
<div id="installModal" class="install-modal-backdrop">
  <div class="install-modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <img class="modal-icon" id="modalIcon" src="app-icon.png" alt="App Icon" />
    <h3 id="modalTitle">Install App</h3>
    <p class="modal-subtitle" id="modalSubtitle">Follow these steps</p>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Game canvas -->
<div id="gameContainer">
  <canvas id="game"></canvas>
</div>

<script>
(function() {
  'use strict';

  // ============ MARKETING CONFIG ============
  // Client delivers: PWA_URL, APP_ICON (180×180 PNG), APP_NAME
  const MKT = {
    PWA_URL: 'https://jtian7823-ux.github.io/snake-landing-page/',  // Client's PWA website URL
    APP_ICON: 'app-icon.png',               // Client's app icon (180×180 PNG)
    APP_NAME: 'Lucky Star',                 // App name shown on home screen
    CTA_INSTALL: 'GET THE APP',             // CTA text — not yet installed
    CTA_OPEN: 'OPEN APP',                   // CTA text — already installed
    CTA_SUB: 'Exclusive rewards inside',    // CTA subtitle
  };

  // ============ PWA INSTALL ENGINE ============
  const PWA = {
    // --- Platform Detection ---
    detect() {
      const ua = navigator.userAgent || '';
      const isIOS = /iPhone|iPad|iPod/.test(ua) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/.test(ua);
      const isSafari = isIOS && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
      const isChrome = isAndroid && /Chrome/.test(ua) && !/EdgA|OPR/.test(ua);

      // In-app browser detection — MUST run BEFORE isSafari is trusted
      // Order matters: specific apps first, then generic WebView fallback
      let inApp = null;
      if (/FBAN|FBAV/i.test(ua)) inApp = 'Facebook';
      else if (/Instagram/i.test(ua)) inApp = 'Instagram';
      else if (/\bLine\//i.test(ua)) inApp = 'LINE';
      else if (/Twitter/i.test(ua)) inApp = 'Twitter';
      else if (/Telegram/i.test(ua)) inApp = 'Telegram';
      else if (/Snapchat/i.test(ua)) inApp = 'Snapchat';
      else if (/WeChat|MicroMessenger/i.test(ua)) inApp = 'WeChat';
      else if (isAndroid && /wv|; wv\)/.test(ua)) inApp = 'WebView';
      else if (isIOS && !isSafari) inApp = 'WebView';

      // If in-app detected, isSafari is NOT real Safari
      const realSafari = isSafari && !inApp;

      return { isIOS, isAndroid, isSafari: realSafari, isChrome, inApp };
    },

    // --- Already-installed detection ---
    isInstalled() {
      return localStorage.getItem('pwa_installed') === '1';
    },
    markInstalled() {
      localStorage.setItem('pwa_installed', '1');
    },

    // --- iOS: Generate .mobileconfig WebClip ---
    async generateMobileConfig() {
      // Convert icon to base64
      const iconB64 = await PWA.iconToBase64(MKT.APP_ICON);
      const uuid1 = crypto.randomUUID();
      const uuid2 = crypto.randomUUID();
      const ts = Date.now();

      const xml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
  "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>PayloadDisplayName</key>
  <string>${PWA.escXML(MKT.APP_NAME)}</string>
  <key>PayloadDescription</key>
  <string>Install ${PWA.escXML(MKT.APP_NAME)}</string>
  <key>PayloadIdentifier</key>
  <string>com.pwa.${ts}</string>
  <key>PayloadOrganization</key>
  <string>${PWA.escXML(MKT.APP_NAME)}</string>
  <key>PayloadType</key>
  <string>Configuration</string>
  <key>PayloadUUID</key>
  <string>${uuid1}</string>
  <key>PayloadVersion</key>
  <integer>1</integer>
  <key>PayloadRemovalDisallowed</key>
  <false/>
  <key>PayloadContent</key>
  <array>
    <dict>
      <key>PayloadType</key>
      <string>com.apple.webClip.managed</string>
      <key>PayloadIdentifier</key>
      <string>com.pwa.webclip.${ts}</string>
      <key>PayloadUUID</key>
      <string>${uuid2}</string>
      <key>PayloadVersion</key>
      <integer>1</integer>
      <key>PayloadDisplayName</key>
      <string>${PWA.escXML(MKT.APP_NAME)}</string>
      <key>Label</key>
      <string>${PWA.escXML(MKT.APP_NAME)}</string>
      <key>URL</key>
      <string>${PWA.escXML(MKT.PWA_URL)}</string>
      <key>FullScreen</key>
      <true/>
      <key>Icon</key>
      <data>${iconB64}</data>
      <key>Precomposed</key>
      <true/>
      <key>IsRemovable</key>
      <true/>
    </dict>
  </array>
</dict>
</plist>`;
      return xml;
    },

    iconToBase64(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = 180; c.height = 180;
          const cx = c.getContext('2d');
          cx.drawImage(img, 0, 0, 180, 180);
          const dataUrl = c.toDataURL('image/png');
          resolve(dataUrl.split(',')[1]); // strip prefix
        };
        img.onerror = () => resolve('');
        img.src = src;
      });
    },

    escXML(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&apos;');
    },

    async downloadMobileConfig() {
      const xml = await PWA.generateMobileConfig();
      const blob = new Blob([xml], { type: 'application/x-apple-aspen-config' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${MKT.APP_NAME.replace(/\s+/g, '-')}.mobileconfig`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      PWA.markInstalled();
    },

    // --- Modal UI ---
    showModal(content) {
      const modal = document.getElementById('installModal');
      const body = document.getElementById('modalBody');
      document.getElementById('modalIcon').src = MKT.APP_ICON;
      document.getElementById('modalTitle').textContent = MKT.APP_NAME;
      body.innerHTML = content;
      modal.classList.add('visible');
    },

    hideModal() {
      document.getElementById('installModal').classList.remove('visible');
    },

    showIOSGuide() {
      PWA.showModal(`
        <p class="modal-subtitle">描述檔即將下載</p>
        <div class="steps">
          <div class="step">
            <span class="step-num">1</span>
            <span class="step-text">點擊下方按鈕<strong>下載描述檔</strong></span>
          </div>
          <div class="step">
            <span class="step-num">2</span>
            <span class="step-text">前往 <strong>設定</strong> → 看到「已下載描述檔」提示</span>
          </div>
          <div class="step">
            <span class="step-num">3</span>
            <span class="step-text">點擊 <strong>安裝</strong> → 輸入密碼 → 完成</span>
          </div>
        </div>
        <button class="modal-btn" id="modalDownloadBtn">📥 下載安裝檔</button>
      `);
      setTimeout(() => {
        const dlBtn = document.getElementById('modalDownloadBtn');
        if (dlBtn) dlBtn.addEventListener('click', async () => {
          await PWA.downloadMobileConfig();
          PWA.showIOSPostInstall();
        });
      }, 50);
    },

    showIOSPostInstall() {
      PWA.showModal(`
        <p class="modal-subtitle">描述檔已下載！</p>
        <div class="steps">
          <div class="step">
            <span class="step-num">✓</span>
            <span class="step-text">開啟 <strong>設定 App</strong></span>
          </div>
          <div class="step">
            <span class="step-num">→</span>
            <span class="step-text">點擊「<strong>已下載描述檔</strong>」通知</span>
          </div>
          <div class="step">
            <span class="step-num">→</span>
            <span class="step-text">點擊右上角 <strong>安裝</strong> → 輸入密碼</span>
          </div>
        </div>
        <button class="modal-btn" onclick="PWA.hideModal()">👍 我知道了</button>
      `);
    },

    showInAppWarning(browser, platform) {
      const browserName = browser || '應用程式';
      const targetBrowser = platform.isIOS ? 'Safari' : 'Chrome';
      const instructions = {
        'Facebook': `點擊右下角 <strong>⋯</strong> 選單 → <strong>在 ${targetBrowser} 中開啟</strong>`,
        'Instagram': `點擊右上角 <strong>⋯</strong> → <strong>在 ${targetBrowser} 中開啟</strong>`,
        'LINE': `點擊右下角 <strong>⋮</strong> → <strong>在預設瀏覽器開啟</strong>`,
        'Twitter': `點擊右下角 <strong>⋯</strong> → <strong>在 ${targetBrowser} 中開啟</strong>`,
        'Telegram': `點擊右上角 <strong>⋮</strong> → <strong>在 ${targetBrowser} 中開啟</strong>`,
        'Snapchat': `長按連結 → <strong>在 ${targetBrowser} 中開啟</strong>`,
        'WeChat': `點擊右上角 <strong>⋯</strong> → <strong>在 ${targetBrowser} 中開啟</strong>`,
        'WebView': `請複製網址，到 <strong>${targetBrowser}</strong> 貼上開啟`,
      };

      PWA.showModal(`
        <div class="inapp-warning">
          <strong>⚠️ 你正在 ${browserName} 內開啟</strong><br>
          需要使用 <strong>${targetBrowser}</strong> 才能安裝 App
        </div>
        <div class="steps">
          <div class="step">
            <span class="step-num">1</span>
            <span class="step-text">${instructions[browser] || instructions['WebView']}</span>
          </div>
          <div class="step">
            <span class="step-num">2</span>
            <span class="step-text">在 ${targetBrowser} 中重新點擊 <strong>安裝按鈕</strong></span>
          </div>
        </div>
        <button class="modal-btn" onclick="PWA.hideModal()">了解</button>
      `);
    },

    showAndroidGuide() {
      // Android: open the PWA_URL directly, Chrome will handle install prompt
      window.open(MKT.PWA_URL, '_blank');
      PWA.markInstalled();
    },

    // --- Main CTA handler ---
    handleCTA() {
      const env = PWA.detect();

      // ★ In-app browser check FIRST — even if "installed", in-app can't open PWA properly
      if (env.inApp) {
        if (env.isAndroid) {
          // Android in-app: try intent URL to escape to Chrome
          const intentUrl = `intent://${MKT.PWA_URL.replace(/^https?:\/\//, '')}#Intent;scheme=https;action=android.intent.action.VIEW;end;`;
          window.location.href = intentUrl;
          setTimeout(() => PWA.showInAppWarning(env.inApp, env), 800);
        } else {
          // iOS in-app: ONLY show instructions, NEVER navigate
          PWA.showInAppWarning(env.inApp, env);
        }
        return;
      }

      // Already installed → just open the app (only in real browsers)
      if (PWA.isInstalled()) {
        window.open(MKT.PWA_URL, '_blank');
        return;
      }

      // iOS Safari → download .mobileconfig
      if (env.isIOS) {
        PWA.showIOSGuide();
        return;
      }

      // Android Chrome → open PWA URL (Chrome handles install)
      if (env.isAndroid) {
        PWA.showAndroidGuide();
        return;
      }

      // Desktop / other → just open URL
      window.open(MKT.PWA_URL, '_blank');
    },

    // --- Update CTA appearance based on install state ---
    updateCTAs() {
      const installed = PWA.isInstalled();
      document.querySelectorAll('.pwa-cta').forEach(btn => {
        btn.querySelector('.cta-text-main').textContent = installed ? MKT.CTA_OPEN : MKT.CTA_INSTALL;
        btn.querySelector('.cta-text-sub').textContent = installed ? MKT.APP_NAME : MKT.CTA_SUB;
        btn.querySelector('.cta-icon').src = MKT.APP_ICON;
      });
    },
  };

  // Make PWA accessible for inline onclick handlers in modal
  window.PWA = PWA;

  // ====== DEBUG: show detection results on page load ======
  (function debugDetection() {
    const env = PWA.detect();
    const info = [
      `UA: ${navigator.userAgent}`,

    resetBtn.onclick = () => { localStorage.removeItem('pwa_installed'); location.reload(); };

  // ====== END DEBUG ======

  // Apply config + install state to CTA buttons
  PWA.updateCTAs();

  // Bind CTA click handlers
  document.querySelectorAll('.pwa-cta').forEach(btn => {

      e.preventDefault();

  // Modal close
  document.getElementById('modalClose').addEventListener('click', PWA.hideModal);
  document.getElementById('installModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) PWA.hideModal();
  });

  // ============ CONFIG ============
  const CFG = {
    // World
    W: 400,
    H: 700,
    GRAVITY: 0.4,
    // Plane
    FLAP: -6,
    PLANE_W: 60,
    PLANE_H: 36,
    MAX_VEL: 10,
    ROTATION_SPEED: 3,
    // Pipes
    PIPE_W: 65,
    PIPE_GAP: 165,
    PIPE_SPEED: 2.5,
    PIPE_INTERVAL: 1600,
    // Visuals
    CLOUD_COUNT: 6,
    PARTICLE_COUNT: 25,
    STAR_COUNT: 30,
  };

  // ============ STATE ============
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const landing = document.getElementById('landing');
  const playBtn = document.getElementById('playBtn');
  const scoreHUD = document.getElementById('scoreHUD');
  const scoreText = document.getElementById('scoreText');
  const scoreFlash = document.getElementById('scoreFlash');
  const gameCta = document.getElementById('gameCta');

  let state = 'landing'; // landing | ready | playing | dying | dead
  let plane, pipes, clouds, particles, score, bestScore, lastPipeTime, frameCount;
  let groundOffset = 0;
  let stars = [];
  let screenShake = 0;
  let isNewBest = false;
  let scorePopTimer = 0;

  // Preload plane image
  const planeImg = new Image();
  planeImg.src = 'plane.png';
  let planeImgReady = false;
  planeImg.onload = () => { planeImgReady = true; };

  bestScore = parseInt(localStorage.getItem('flappyPlaneBest') || '0');

  // ============ CTA POSITIONING ============
  function updateCtaPosition() {
    if (state === 'ready' || state === 'dead') {
      gameCta.classList.add('visible');
      // Position at bottom of canvas
      const rect = canvas.getBoundingClientRect();
      const ctaH = gameCta.offsetHeight;
      gameCta.style.left = rect.left + 'px';
      gameCta.style.width = rect.width + 'px';
      gameCta.style.top = (rect.bottom - ctaH - 16) + 'px';

      gameCta.style.justifyContent = 'center';

      gameCta.classList.remove('visible');
    }
  }

  // ============ LANDING PARTICLES ============
  (function initLandingParticles() {
    const lc = document.getElementById('landingParticles');
    const lctx = lc.getContext('2d');
    const dots = [];
    const DOT_COUNT = 60;

    function resizeLanding() {
      lc.width = window.innerWidth;
      lc.height = window.innerHeight;
    }
    resizeLanding();
    window.addEventListener('resize', resizeLanding);

    for (let i = 0; i < DOT_COUNT; i++) {
      dots.push({
        x: Math.random() * lc.width,
        y: Math.random() * lc.height,
        r: 1 + Math.random() * 2.5,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -0.3 - Math.random() * 0.7,
        alpha: 0.2 + Math.random() * 0.5,
      });
    }

    function drawLandingParticles() {
      if (state !== 'landing') return;
      lctx.clearRect(0, 0, lc.width, lc.height);
      dots.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;
        if (d.y < -10) { d.y = lc.height + 10; d.x = Math.random() * lc.width; }
        if (d.x < -10) d.x = lc.width + 10;
        if (d.x > lc.width + 10) d.x = -10;

        lctx.beginPath();
        lctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        lctx.fillStyle = `rgba(230,57,70,${d.alpha})`;
        lctx.fill();

        // Glow
        lctx.beginPath();
        lctx.arc(d.x, d.y, d.r * 3, 0, Math.PI * 2);
        lctx.fillStyle = `rgba(230,57,70,${d.alpha * 0.15})`;
        lctx.fill();
      });
      requestAnimationFrame(drawLandingParticles);
    }
    drawLandingParticles();
  })();

  // ============ RESPONSIVE CANVAS ============
  function resizeCanvas() {
    const ratio = CFG.W / CFG.H;
    let w = window.innerWidth;
    let h = window.innerHeight;
    if (w / h > ratio) {
      canvas.style.height = h + 'px';
      canvas.style.width = (h * ratio) + 'px';
    } else {
      canvas.style.width = w + 'px';
      canvas.style.height = (w / ratio) + 'px';
    }
    canvas.width = CFG.W;
    canvas.height = CFG.H;
    updateCtaPosition();
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ============ DRAWING HELPERS ============

  // Sky gradient — warm sunset tones
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, CFG.H);
    grad.addColorStop(0, '#1a73e8');
    grad.addColorStop(0.3, '#4fc3f7');
    grad.addColorStop(0.55, '#81d4fa');
    grad.addColorStop(0.75, '#ffe0b2');
    grad.addColorStop(0.88, '#ffab40');
    grad.addColorStop(1, '#4CAF50');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  }

  // Background floating stars/sparkles
  function createStars() {
    stars = [];
    for (let i = 0; i < CFG.STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * CFG.W,
        y: Math.random() * CFG.H * 0.6,
        r: 0.5 + Math.random() * 1.5,
        twinkleSpeed: 0.02 + Math.random() * 0.04,
        offset: Math.random() * Math.PI * 2,
      });
    }
  }

  function drawStars() {
    stars.forEach(s => {
      const alpha = 0.2 + Math.sin(frameCount * s.twinkleSpeed + s.offset) * 0.2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
  }

  // Clouds
  function createClouds() {
    clouds = [];
    for (let i = 0; i < CFG.CLOUD_COUNT; i++) {
      clouds.push({
        x: Math.random() * CFG.W * 1.5,
        y: 30 + Math.random() * (CFG.H * 0.35),
        w: 60 + Math.random() * 80,
        speed: 0.3 + Math.random() * 0.5,
        opacity: 0.15 + Math.random() * 0.3,
      });
    }
  }

  function drawClouds() {
    clouds.forEach(c => {
      ctx.save();
      ctx.globalAlpha = c.opacity;
      ctx.fillStyle = '#fff';
      const h = c.w * 0.4;
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w * 0.5, h * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x - c.w * 0.25, c.y + h * 0.1, c.w * 0.3, h * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x + c.w * 0.25, c.y + h * 0.05, c.w * 0.35, h * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function updateClouds() {
    clouds.forEach(c => {
      c.x -= c.speed;
      if (c.x < -c.w) {
        c.x = CFG.W + c.w;
        c.y = 30 + Math.random() * (CFG.H * 0.35);
      }
    });
  }

  // Ground — richer with layered depth
  const GROUND_H = 80;
  function drawGround() {
    const y = CFG.H - GROUND_H;

    // Dirt with gradient
    const dirtGrad = ctx.createLinearGradient(0, y + 20, 0, CFG.H);
    dirtGrad.addColorStop(0, '#8B6914');
    dirtGrad.addColorStop(0.5, '#7A5C10');
    dirtGrad.addColorStop(1, '#6B4F0C');
    ctx.fillStyle = dirtGrad;
    ctx.fillRect(0, y + 20, CFG.W, GROUND_H - 20);

    // Grass top with richer gradient
    const grassGrad = ctx.createLinearGradient(0, y, 0, y + 22);
    grassGrad.addColorStop(0, '#66BB6A');
    grassGrad.addColorStop(0.4, '#4CAF50');
    grassGrad.addColorStop(1, '#388E3C');
    ctx.fillStyle = grassGrad;
    ctx.fillRect(0, y, CFG.W, 22);

    // Grass blades
    ctx.strokeStyle = '#2E7D32';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < CFG.W; i += 10) {
      const offset = ((i + groundOffset) % CFG.W + CFG.W) % CFG.W;
      ctx.beginPath();
      ctx.moveTo(offset, y);
      ctx.quadraticCurveTo(offset - 2, y - 5, offset - 4, y - 8);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(offset + 5, y);
      ctx.quadraticCurveTo(offset + 7, y - 3, offset + 9, y - 5);
      ctx.stroke();
    }

    // Top edge highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(CFG.W, y);
    ctx.stroke();
  }

  // Plane (image-based) with enhanced exhaust
  function drawPlane(x, y, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation * Math.PI / 180);

    const w = CFG.PLANE_W;
    const h = CFG.PLANE_H;
    const hw = w / 2;
    const hh = h / 2;

    // Enhanced exhaust when flying
    if (state === 'playing') {
      // Trail smoke
      for (let i = 0; i < 5; i++) {
        const ex = -hw - 5 - Math.random() * 25;
        const ey = (Math.random() - 0.5) * 10;
        const er = 2 + Math.random() * 4;
        const alpha = 0.35 - i * 0.06;
        ctx.beginPath();
        ctx.arc(ex, ey, er, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,220,220,${Math.max(0, alpha)})`;
        ctx.fill();
      }
      // Hot exhaust glow
      ctx.beginPath();
      ctx.arc(-hw - 3, 0, 4, 0, Math.PI * 2);
      const exGrad = ctx.createRadialGradient(-hw - 3, 0, 0, -hw - 3, 0, 6);
      exGrad.addColorStop(0, 'rgba(255,200,50,0.4)');
      exGrad.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = exGrad;
      ctx.fill();
    }

    if (planeImgReady) {
      const drawW = w * 1.3;
      const drawH = drawW * (planeImg.naturalHeight / planeImg.naturalWidth);
      ctx.drawImage(planeImg, -drawW / 2, -drawH / 2, drawW, drawH);
    } else {
      ctx.fillStyle = '#c1121f';
      ctx.beginPath();
      ctx.ellipse(0, 0, hw * 0.85, hh * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // Pipes — enhanced 3D look with shadows
  function drawPipe(pipe) {
    const x = pipe.x;
    const gapY = pipe.gapY;
    const gapH = CFG.PIPE_GAP;
    const w = CFG.PIPE_W;
    const topH = gapY - gapH / 2;
    const botY = gapY + gapH / 2;
    const botH = CFG.H - GROUND_H - botY;

    // Drop shadow behind pipes
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    if (topH > 0) ctx.fillRect(x + 4, 0, w, topH + 4);
    if (botH > 0) ctx.fillRect(x + 4, botY, w, botH + 4);

    if (topH > 0) drawSinglePipe(x, 0, w, topH, true);
    if (botH > 0) drawSinglePipe(x, botY, w, botH, false);
  }

  function drawSinglePipe(x, y, w, h, isTop) {
    // Main body — richer gradient
    const grad = ctx.createLinearGradient(x, 0, x + w, 0);
    grad.addColorStop(0, '#388e3c');
    grad.addColorStop(0.15, '#43a047');
    grad.addColorStop(0.35, '#66bb6a');
    grad.addColorStop(0.5, '#81c784');
    grad.addColorStop(0.65, '#66bb6a');
    grad.addColorStop(0.85, '#43a047');
    grad.addColorStop(1, '#1b5e20');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);

    // Inner highlight stripe
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x + 8, y, 6, h);

    // Dark edge stripe
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(x + w - 8, y, 6, h);

    // Border
    ctx.strokeStyle = '#1b5e20';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    // Cap — more 3D
    const capH = 28;
    const capW = w + 14;
    const capX = x - 7;
    const capY = isTop ? y + h - capH : y;

    const capGrad = ctx.createLinearGradient(capX, 0, capX + capW, 0);
    capGrad.addColorStop(0, '#2e7d32');
    capGrad.addColorStop(0.2, '#43a047');
    capGrad.addColorStop(0.4, '#66bb6a');
    capGrad.addColorStop(0.5, '#81c784');
    capGrad.addColorStop(0.6, '#66bb6a');
    capGrad.addColorStop(0.8, '#43a047');
    capGrad.addColorStop(1, '#1b5e20');
    ctx.fillStyle = capGrad;
    ctx.fillRect(capX, capY, capW, capH);

    // Cap top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(capX + 2, capY + (isTop ? 0 : 0), capW - 4, 3);

    ctx.strokeStyle = '#1b5e20';
    ctx.lineWidth = 2;
    ctx.strokeRect(capX, capY, capW, capH);
  }

  // Particles on crash — more dramatic
  function createCrashParticles(x, y) {
    particles = [];
    const colors = ['#e63946', '#c1121f', '#ff6b6b', '#ffd166', '#ff9500', '#fff', '#555'];
    for (let i = 0; i < CFG.PARTICLE_COUNT; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 12,
        vy: (Math.random() - 0.5) * 12,
        r: 2 + Math.random() * 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1,
        decay: 0.015 + Math.random() * 0.025,
      });
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      if (p.life > 0.5) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 2, 0, Math.PI * 2);
        ctx.globalAlpha = p.life * 0.3;
        ctx.fillStyle = `rgba(255,200,100,${p.life * 0.15})`;
        ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
  }

  function updateParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.25;
      p.vx *= 0.99;
      p.life -= p.decay;
      p.r *= 0.98;
    });
  }

  // Score popup particles (when scoring)
  let scorePops = [];
  function createScorePop(x, y) {
    for (let i = 0; i < 8; i++) {
      scorePops.push({
        x: x + (Math.random() - 0.5) * 30,
        y: y + (Math.random() - 0.5) * 30,
        vy: -1 - Math.random() * 2,
        r: 2 + Math.random() * 3,
        life: 1,
        color: ['#ffd166', '#ffab40', '#fff'][Math.floor(Math.random() * 3)],
      });
    }
  }

  function drawScorePops() {
    scorePops = scorePops.filter(p => p.life > 0);
    scorePops.forEach(p => {
      p.y += p.vy;
      p.life -= 0.03;
      p.r *= 0.97;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // Score display (in-game, on canvas for game over screen)
  function drawScoreOnCanvas(s, x, y, size) {
    ctx.font = `bold ${size}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 5;
    ctx.strokeText(s, x, y);
    ctx.fillText(s, x, y);
  }

  // Game Over overlay — redesigned
  function drawGameOver() {
    // Dim with vignette
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, CFG.W, CFG.H);

    // Extra vignette
    const vigGrad = ctx.createRadialGradient(CFG.W/2, CFG.H/2, CFG.H*0.3, CFG.W/2, CFG.H/2, CFG.H*0.7);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, CFG.W, CFG.H);

    // Panel — shifted up to make room for CTA
    const pw = 300, ph = 280;
    const px = (CFG.W - pw) / 2;
    const py = (CFG.H - ph) / 2 - 50;

    // Panel shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRectPath(px + 4, py + 4, pw, ph, 20);
    ctx.fill();

    // Panel background
    const panelGrad = ctx.createLinearGradient(px, py, px, py + ph);
    panelGrad.addColorStop(0, 'rgba(40,40,80,0.95)');
    panelGrad.addColorStop(1, 'rgba(20,20,50,0.98)');
    ctx.fillStyle = panelGrad;
    roundRectPath(px, py, pw, ph, 20);
    ctx.fill();

    // Panel border glow
    ctx.strokeStyle = 'rgba(230,57,70,0.3)';
    ctx.lineWidth = 2;
    roundRectPath(px, py, pw, ph, 20);
    ctx.stroke();

    // Inner border
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    roundRectPath(px + 4, py + 4, pw - 8, ph - 8, 18);
    ctx.stroke();

    // Title
    ctx.font = "bold 36px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e63946';
    ctx.shadowColor = 'rgba(230,57,70,0.5)';
    ctx.shadowBlur = 15;
    ctx.fillText('GAME OVER', CFG.W / 2, py + 50);
    ctx.shadowBlur = 0;

    // Divider line
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px + 30, py + 65);
    ctx.lineTo(px + pw - 30, py + 65);
    ctx.stroke();

    // Score section
    ctx.font = "15px 'Segoe UI', system-ui, sans-serif";
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('SCORE', CFG.W / 2, py + 90);
    ctx.font = "bold 48px 'Segoe UI', system-ui, sans-serif";
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(255,255,255,0.2)';
    ctx.shadowBlur = 10;
    ctx.fillText(score.toString(), CFG.W / 2, py + 138);
    ctx.shadowBlur = 0;

    // Best section
    ctx.font = "15px 'Segoe UI', system-ui, sans-serif";
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('BEST', CFG.W / 2, py + 165);

    // NEW BEST animation
    if (isNewBest) {
      const pulse = Math.sin(frameCount * 0.1) * 0.15 + 1;
      ctx.save();
      ctx.translate(CFG.W / 2, py + 195);
      ctx.scale(pulse, pulse);
      ctx.font = "bold 32px 'Segoe UI', system-ui, sans-serif";
      ctx.fillStyle = '#ffd166';
      ctx.shadowColor = 'rgba(255,209,102,0.6)';
      ctx.shadowBlur = 20;
      const scoreStr = bestScore.toString();
      const scoreWidth = ctx.measureText(scoreStr).width;
      ctx.fillText(scoreStr, 0, 0);
      ctx.shadowBlur = 0;

      // NEW badge
      ctx.font = "bold 11px 'Segoe UI', system-ui, sans-serif";
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('NEW!', scoreWidth / 2 + 8, -18);
      ctx.restore();
    } else {
      ctx.font = "bold 32px 'Segoe UI', system-ui, sans-serif";
      ctx.fillStyle = '#ffd166';
      ctx.fillText(bestScore.toString(), CFG.W / 2, py + 195);
    }

    // Star rating
    const starY = py + 225;
    const starSize = 18;
    const starCount = score >= 10 ? 3 : score >= 5 ? 2 : score >= 1 ? 1 : 0;
    for (let i = 0; i < 3; i++) {
      const sx = CFG.W / 2 + (i - 1) * 35;
      drawStar(sx, starY, starSize, i < starCount ? '#ffd166' : 'rgba(255,255,255,0.15)');
    }

    // Tap to restart
    const blink = Math.sin(frameCount * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = blink;
    ctx.font = "bold 16px 'Segoe UI', system-ui, sans-serif";
    ctx.fillStyle = '#fff';
    ctx.fillText('TAP TO RESTART', CFG.W / 2, py + ph - 12);
    ctx.globalAlpha = 1;
  }

  // Draw 5-point star
  function drawStar(cx, cy, r, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    }
    ctx.closePath();
    ctx.fill();
    // Inner glow for filled stars
    if (color === '#ffd166') {
      ctx.shadowColor = 'rgba(255,209,102,0.5)';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  function roundRectPath(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // "Get Ready" overlay
  function drawReady() {
    const blink = Math.sin(frameCount * 0.06) * 0.3 + 0.7;

    // Instruction panel
    const pw = 220, ph = 80;
    const px = (CFG.W - pw) / 2;
    const py = CFG.H / 2 + 30;
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    roundRectPath(px, py, pw, ph, 12);
    ctx.fill();

    ctx.globalAlpha = blink;
    ctx.font = "bold 26px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 8;
    ctx.fillText('TAP TO START', CFG.W / 2, py + 35);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Tap icon
    ctx.save();
    ctx.translate(CFG.W / 2, py + 60);
    ctx.globalAlpha = blink * 0.6;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    const ringSize = 12 + Math.sin(frameCount * 0.08) * 4;
    ctx.beginPath();
    ctx.arc(0, 0, ringSize, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // ============ GAME LOGIC ============

  function resetGame() {
    plane = {
      x: CFG.W * 0.25,
      y: CFG.H / 2,
      vel: 0,
      rotation: 0,
      targetRotation: 0,
    };
    pipes = [];
    particles = [];
    scorePops = [];
    score = 0;
    lastPipeTime = 0;
    frameCount = 0;
    groundOffset = 0;
    screenShake = 0;
    isNewBest = false;
    scorePopTimer = 0;
    scoreText.textContent = '0';
  }

  function flap() {
    plane.vel = CFG.FLAP;
    plane.targetRotation = -25;
  }

  function spawnPipe() {
    const minY = CFG.PIPE_GAP / 2 + 60;
    const maxY = CFG.H - GROUND_H - CFG.PIPE_GAP / 2 - 60;
    const gapY = minY + Math.random() * (maxY - minY);
    pipes.push({
      x: CFG.W + CFG.PIPE_W,
      gapY: gapY,
      scored: false,
    });
  }

  function checkCollision() {
    const hitW = CFG.PLANE_W * 0.35;
    const hitH = CFG.PLANE_H * 0.3;
    const px1 = plane.x - hitW;
    const px2 = plane.x + hitW;
    const py1 = plane.y - hitH;
    const py2 = plane.y + hitH;

    if (py2 >= CFG.H - GROUND_H) return true;
    if (py1 <= 0) return true;

    for (const pipe of pipes) {
      const pipeLeft = pipe.x;
      const pipeRight = pipe.x + CFG.PIPE_W;
      const gapTop = pipe.gapY - CFG.PIPE_GAP / 2;
      const gapBot = pipe.gapY + CFG.PIPE_GAP / 2;

      if (px2 > pipeLeft && px1 < pipeRight) {
        if (py1 < gapTop || py2 > gapBot) {
          return true;
        }
      }
    }
    return false;
  }

  function triggerScoreEffect() {
    // Flash screen
    scoreFlash.classList.add('flash');
    setTimeout(() => scoreFlash.classList.remove('flash'), 80);

    // Pop score text
    scoreText.classList.add('pop');
    setTimeout(() => scoreText.classList.remove('pop'), 150);

    // Spawn score particles at the gap the plane just passed
    createScorePop(plane.x + 30, plane.y);
  }

  let prevState = 'landing';
  function update() {
    frameCount++;

    if (screenShake > 0) screenShake *= 0.85;

    if (state === 'ready') {
      plane.y = CFG.H / 2 + Math.sin(frameCount * 0.05) * 15;
      plane.rotation = Math.sin(frameCount * 0.05) * 5;
      updateClouds();
      groundOffset -= CFG.PIPE_SPEED * 0.5;
    }

    if (state === 'playing') {
      plane.vel += CFG.GRAVITY;
      if (plane.vel > CFG.MAX_VEL) plane.vel = CFG.MAX_VEL;
      plane.y += plane.vel;

      if (plane.vel > 2) {
        plane.targetRotation = Math.min(70, plane.vel * 8);
      }
      const rotDiff = plane.targetRotation - plane.rotation;
      plane.rotation += rotDiff * 0.1;

      const now = performance.now();
      if (now - lastPipeTime > CFG.PIPE_INTERVAL) {
        spawnPipe();
        lastPipeTime = now;
      }

      pipes.forEach(p => {
        p.x -= CFG.PIPE_SPEED;
        if (!p.scored && p.x + CFG.PIPE_W < plane.x) {
          p.scored = true;
          score++;
          scoreText.textContent = score.toString();
          triggerScoreEffect();
        }
      });

      pipes = pipes.filter(p => p.x > -CFG.PIPE_W - 20);
      groundOffset -= CFG.PIPE_SPEED;

      if (checkCollision()) {
        state = 'dying';
        screenShake = 8;
        createCrashParticles(plane.x, plane.y);
        if (score > bestScore) {
          bestScore = score;
          isNewBest = true;
          localStorage.setItem('flappyPlaneBest', bestScore.toString());
        }
      }

      updateClouds();
    }

    if (state === 'dying') {
      plane.vel += CFG.GRAVITY;
      plane.y += plane.vel;
      plane.rotation += 5;
      updateParticles();

      if (plane.y > CFG.H + 50) {
        state = 'dead';
      }
    }

    if (state === 'dead') {
      updateParticles();
    }

    // Update CTA visibility on state change
    if (state !== prevState) {
      prevState = state;
      updateCtaPosition();
    }
  }

  function draw() {
    ctx.save();

    // Screen shake
    if (screenShake > 0.5) {
      const sx = (Math.random() - 0.5) * screenShake;
      const sy = (Math.random() - 0.5) * screenShake;
      ctx.translate(sx, sy);
    }

    drawSky();
    drawStars();
    drawClouds();

    // Pipes behind plane
    pipes.forEach(drawPipe);

    // Plane
    if (state !== 'dead') {
      drawPlane(plane.x, plane.y, plane.rotation);
    }

    // Particles
    if (particles.length > 0) drawParticles();

    // Score pops
    if (scorePops.length > 0) drawScorePops();

    // Ground (in front)
    drawGround();

    // UI
    if (state === 'ready') drawReady();
    if (state === 'dead') drawGameOver();

    ctx.restore();
  }

  // ============ MAIN LOOP ============
  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // ============ INPUT ============
  function handleInput(e) {
    e.preventDefault();

    if (state === 'ready') {
      state = 'playing';
      lastPipeTime = performance.now();
      scoreHUD.classList.add('visible');
      flap();
      return;
    }

    if (state === 'playing') {
      flap();
      return;
    }

    if (state === 'dead') {
      resetGame();
      state = 'ready';
      scoreHUD.classList.remove('visible');
      createClouds();
      return;
    }
  }

  canvas.addEventListener('mousedown', handleInput);
  canvas.addEventListener('touchstart', handleInput, { passive: false });
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      handleInput(e);
    }
  });

  // ============ LANDING → GAME ============
  playBtn.addEventListener('click', () => {
    landing.classList.add('hidden');
    resetGame();
    createClouds();
    createStars();
    state = 'ready';
    updateCtaPosition();
    setTimeout(() => { landing.style.display = 'none'; }, 600);
  });

  // ============ INIT ============
  resetGame();
  createClouds();
  createStars();
  gameLoop();

})();
</script>

</body>
